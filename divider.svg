<svg xmlns="http://www.w3.org/2000/svg" width="800" height="16" viewBox="0 0 800 16">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0A0A0A"/>
      <stop offset="25%" stop-color="#FF6B00"/>
      <stop offset="50%" stop-color="#FFA500"/>
      <stop offset="75%" stop-color="#FF6B00"/>
      <stop offset="100%" stop-color="#0A0A0A"/>
    </linearGradient>
    <linearGradient id="h" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="50%" stop-color="#FF6B00" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>
    <style>
      @keyframes glow { 0%,100%{stop-color:#FF6B00} 50%{stop-color:#FFA500} }
      .glow stop { animation: glow 3s ease-in-out infinite; }
    </style>
  </defs>
  <rect x="50" y="7" width="700" height="2" fill="url(#g)" rx="1"/>
</svg>