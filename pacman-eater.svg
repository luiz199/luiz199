      .c9 { animation: e9 3.5s steps(1) infinite; }
      .c10 { animation: e10 3.5s steps(1) infinite; }
      .c11 { animation: e11 3.5s steps(1) infinite; }
      .c12 { animation: e12 3.5s steps(1) infinite; }
      .c13 { animation: e13 3.5s steps(1) infinite; }
      .c14 { animation: e14 3.5s steps(1) infinite; }
      .c15 { animation: e15 3.5s steps(1) infinite; }
      .c16 { animation: e16 3.5s steps(1) infinite; }
      .c17 { animation: e17 3.5s steps(1) infinite; }
      .c18 { animation: e18 3.5s steps(1) infinite; }

      @keyframes t1 { 0%,10%{opacity:1} 10.01%,100%{opacity:0} }
      @keyframes t2 { 10%,20%{opacity:1} 20.01%,100%,0%,9.99%{opacity:0} }
      @keyframes t3 { 20%,30%{opacity:1} 30.01%,100%,0%,19.99%{opacity:0} }
      @keyframes t4 { 30%,40%{opacity:1} 40.01%,100%,0%,29.99%{opacity:0} }
      @keyframes t5 { 40%,50%{opacity:1} 50.01%,100%,0%,39.99%{opacity:0} }
      @keyframes t6 { 50%,60%{opacity:1} 60.01%,100%,0%,49.99%{opacity:0} }
      @keyframes t7 { 60%,70%{opacity:1} 70.01%,100%,0%,59.99%{opacity:0} }
      @keyframes t8 { 70%,80%{opacity:1} 80.01%,100%,0%,69.99%{opacity:0} }
      @keyframes t9 { 80%,90%{opacity:1} 90.01%,100%,0%,79.99%{opacity:0} }
      @keyframes t10 { 90%,100%{opacity:1} 0%,89.99%{opacity:0} }
      .s1 { animation: t1 35s steps(1) infinite; }
      .s2 { animation: t2 35s steps(1) infinite; }
      .s3 { animation: t3 35s steps(1) infinite; }
      .s4 { animation: t4 35s steps(1) infinite; }
      .s5 { animation: t5 35s steps(1) infinite; }
      .s6 { animation: t6 35s steps(1) infinite; }
      .s7 { animation: t7 35s steps(1) infinite; }
      .s8 { animation: t8 35s steps(1) infinite; }
      .s9 { animation: t9 35s steps(1) infinite; }
      .s10 { animation: t10 35s steps(1) infinite; }
    </style>
