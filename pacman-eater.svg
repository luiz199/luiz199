<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="640" height="140" viewBox="0 0 640 140">
  <defs>
    <style>
      @keyframes movePacman {
        0% { transform: translateX(-50px); }
        100% { transform: translateX(690px); }
      }
      @keyframes chomp {
        0%, 100% { transform: rotate(0deg); }
        30% { transform: rotate(25deg); }
        60% { transform: rotate(0deg); }
        80% { transform: rotate(-20deg); }
      }
      @keyframes eyeBlink {
        0%, 96%, 100% { opacity: 0; }
        97%, 99% { opacity: 1; }
      }
      @keyframes textFade {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.3; }
      }
      @keyframes pulseBorder {
        0%, 100% { stroke: #FF6B00; stroke-width: 1; }
        50% { stroke: #FF9A4A; stroke-width: 1.5; }
      }
      .pacman-group { animation: movePacman 3.5s linear infinite; }
      .mouth { animation: chomp 0.3s ease-in-out infinite; transform-origin: 0px 68px; }
      .eye { animation: eyeBlink 1.5s ease-in-out infinite; }
      .text-blink { animation: textFade 1.5s ease-in-out infinite; }
      .border { animation: pulseBorder 2s ease-in-out infinite; }
      .char { fill: #FFB84D; font-family: monospace; font-size: 22px; font-weight: bold; }
      @keyframes e1 { 0%,12%{opacity:1} 13%,100%{opacity:0} }
      @keyframes e2 { 0%,17%{opacity:1} 18%,100%{opacity:0} }
      @keyframes e3 { 0%,22%{opacity:1} 23%,100%{opacity:0} }
      @keyframes e4 { 0%,26%{opacity:1} 27%,100%{opacity:0} }
      @keyframes e5 { 0%,30%{opacity:1} 31%,100%{opacity:0} }
      @keyframes e6 { 0%,34%{opacity:1} 35%,100%{opacity:0} }
      @keyframes e7 { 0%,40%{opacity:1} 41%,100%{opacity:0} }
      @keyframes e8 { 0%,44%{opacity:1} 45%,100%{opacity:0} }
      @keyframes e9 { 0%,48%{opacity:1} 49%,100%{opacity:0} }
      @keyframes e10 { 0%,52%{opacity:1} 53%,100%{opacity:0} }
      @keyframes e11 { 0%,56%{opacity:1} 57%,100%{opacity:0} }
      @keyframes e12 { 0%,60%{opacity:1} 61%,100%{opacity:0} }
      @keyframes e13 { 0%,64%{opacity:1} 65%,100%{opacity:0} }
      @keyframes e14 { 0%,69%{opacity:1} 70%,100%{opacity:0} }
      @keyframes e15 { 0%,73%{opacity:1} 74%,100%{opacity:0} }
      @keyframes e16 { 0%,77%{opacity:1} 78%,100%{opacity:0} }
      .c1 { animation: e1 3.5s steps(1) infinite; }
      .c2 { animation: e2 3.5s steps(1) infinite; }
      .c3 { animation: e3 3.5s steps(1) infinite; }
      .c4 { animation: e4 3.5s steps(1) infinite; }
      .c5 { animation: e5 3.5s steps(1) infinite; }
      .c6 { animation: e6 3.5s steps(1) infinite; }
      .c7 { animation: e7 3.5s steps(1) infinite; }
      .c8 { animation: e8 3.5s steps(1) infinite; }
      .c9 { animation: e9 3.5s steps(1) infinite; }
      .c10 { animation: e10 3.5s steps(1) infinite; }
      .c11 { animation: e11 3.5s steps(1) infinite; }
      .c12 { animation: e12 3.5s steps(1) infinite; }
      .c13 { animation: e13 3.5s steps(1) infinite; }
      .c14 { animation: e14 3.5s steps(1) infinite; }
      .c15 { animation: e15 3.5s steps(1) infinite; }
      .c16 { animation: e16 3.5s steps(1) infinite; }
      @keyframes ghostWobble {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-4px); }
      }
      @keyframes ghostEye {
        0%, 100% { transform: translateX(0); }
        50% { transform: translateX(2px); }
      }
      .ghost-group { animation: ghostWobble 0.8s ease-in-out infinite; }
      .ghost-eye { animation: ghostEye 0.4s ease-in-out infinite; }
    </style>
  </defs>

  <rect x="3" y="3" width="634" height="134" rx="8" fill="#0A0A0A" class="border"/>

  <line x1="10" y1="100" x2="630" y2="100" stroke="#222" stroke-width="2"/>

  <text x="45" y="72" class="char c1">S</text>
  <text x="72" y="72" class="char c2">Y</text>
  <text x="99" y="72" class="char c3">S</text>
  <text x="126" y="72" class="char c4">T</text>
  <text x="153" y="72" class="char c5">E</text>
  <text x="180" y="72" class="char c6">M</text>

  <text x="225" y="72" class="char c7">B</text>
  <text x="252" y="72" class="char c8">O</text>
  <text x="279" y="72" class="char c9">O</text>
  <text x="306" y="72" class="char c10">T</text>
  <text x="333" y="72" class="char c11">I</text>
  <text x="360" y="72" class="char c12">N</text>
  <text x="387" y="72" class="char c13">G</text>

  <text x="423" y="72" class="char c14">.</text>
  <text x="450" y="72" class="char c15">.</text>
  <text x="477" y="72" class="char c16">.</text>

  <g class="ghost-group">
    <path d="M555,55 C555,42 568,32 583,32 C598,32 611,42 611,55 L611,85 L603,78 L595,85 L587,78 L579,85 L571,78 L563,85 L555,78 Z" fill="#FF0000"/>
    <circle cx="574" cy="50" r="4" fill="#FFF" class="ghost-eye"/>
    <circle cx="592" cy="50" r="4" fill="#FFF" class="ghost-eye"/>
    <circle cx="575" cy="51" r="2" fill="#000"/>
    <circle cx="593" cy="51" r="2" fill="#000"/>
  </g>

  <g class="pacman-group">
    <circle cx="0" cy="68" r="19" fill="#FFD700"/>
    <circle cx="0" cy="68" r="19" fill="#FF6B00"/>
    <polygon points="0,68 15,49 15,87" fill="#0A0A0A" class="mouth"/>
    <circle cx="-7" cy="58" r="3.5" fill="#FFF" class="eye"/>
    <circle cx="-7" cy="58" r="2" fill="#111" class="eye"/>
  </g>

  <text x="320" y="125" font-family="monospace" font-size="12" fill="#555" text-anchor="middle" class="text-blink">$ pacman eating letters...</text>
</svg>
