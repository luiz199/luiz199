<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="640" height="130" viewBox="0 0 640 130">
  <defs>
    <style>
      @keyframes movePacman {
        0% { transform: translateX(-50px); }
        100% { transform: translateX(690px); }
      }
      @keyframes chomp {
        0%, 100% { transform: rotate(0deg); }
        30% { transform: rotate(25deg); }
        60% { transform: rotate(0deg); }
        80% { transform: rotate(-20deg); }
      }
      @keyframes ghostWobble {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-5px); }
      }
      @keyframes ghostFlee {
        0%, 86% { opacity: 1; }
        87%, 94% { opacity: 0; }
        95%, 100% { opacity: 1; }
      }
      @keyframes pulseBorder {
        0%, 100% { stroke: #FF6B00; stroke-width: 1; }
        50% { stroke: #FF9A4A; stroke-width: 1.5; }
      }
      .pacman-group { animation: movePacman 3.5s linear infinite; }
      .mouth { animation: chomp 0.3s ease-in-out infinite; transform-origin: 0px 65px; }
      .border { animation: pulseBorder 2s ease-in-out infinite; }
      .ghost-visibility { animation: ghostFlee 3.5s steps(1) infinite; }
      .ghost-group { animation: ghostWobble 0.8s ease-in-out infinite; }
      .dot { fill: #FFB84D; }
    </style>
  </defs>

  <rect x="3" y="3" width="634" height="124" rx="8" fill="#0A0A0A" class="border"/>
  <line x1="10" y1="98" x2="630" y2="98" stroke="#222" stroke-width="2"/>

  <circle class="dot" cx="80" cy="65" r="5"/>
  <circle class="dot" cx="130" cy="65" r="5"/>
  <circle class="dot" cx="180" cy="65" r="5"/>
  <circle class="dot" cx="230" cy="65" r="5"/>
  <circle class="dot" cx="280" cy="65" r="5"/>
  <circle class="dot" cx="330" cy="65" r="5"/>
  <circle class="dot" cx="380" cy="65" r="5"/>
  <circle class="dot" cx="430" cy="65" r="5"/>
  <circle class="dot" cx="480" cy="65" r="5"/>
  <circle class="dot" cx="530" cy="65" r="5"/>

  <circle cx="580" cy="65" r="10" fill="#FFB84D" opacity="0.4"/>

  <g class="ghost-visibility">
    <g class="ghost-group">
      <path d="M555,52 C555,39 568,29 583,29 C598,29 611,39 611,52 L611,82 L603,75 L595,82 L587,75 L579,82 L571,75 L563,82 L555,75 Z" fill="#FF0000"/>
      <circle cx="574" cy="47" r="4" fill="#FFF"/>
      <circle cx="592" cy="47" r="4" fill="#FFF"/>
      <circle cx="575" cy="48" r="2" fill="#000"/>
      <circle cx="593" cy="48" r="2" fill="#000"/>
    </g>
  </g>

  <g class="pacman-group">
    <circle cx="0" cy="65" r="18" fill="#FFD700"/>
    <circle cx="0" cy="65" r="18" fill="#FF6B00"/>
    <polygon points="0,65 14,47 14,83" fill="#0A0A0A" class="mouth"/>
    <circle cx="-6" cy="56" r="3" fill="#FFF"/>
    <circle cx="-6" cy="56" r="1.5" fill="#111"/>
  </g>

  <text x="320" y="118" font-family="monospace" font-size="13" fill="#FFB84D" text-anchor="middle">$ system operational</text>
</svg>
