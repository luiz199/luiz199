<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="640" height="150" viewBox="0 0 640 150">
  <defs>
    <style>
      @keyframes movePacman {
        0% { transform: translateX(-50px); }
        100% { transform: translateX(690px); }
      }
      @keyframes chomp {
        0%, 100% { transform: rotate(0deg); }
        30% { transform: rotate(25deg); }
        60% { transform: rotate(0deg); }
        80% { transform: rotate(-20deg); }
      }
      @keyframes eyeBlink {
        0%, 96%, 100% { opacity: 0; }
        97%, 99% { opacity: 1; }
      }
      @keyframes pulseBorder {
        0%, 100% { stroke: #FF6B00; stroke-width: 1; }
        50% { stroke: #FF9A4A; stroke-width: 1.5; }
      }
      @keyframes ghostWobble {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-5px); }
      }
      @keyframes ghostFlee {
        0%, 82% { opacity: 1; }
        83%, 94% { opacity: 0; }
        95%, 100% { opacity: 1; }
      }
      @keyframes ghostEye {
        0%, 100% { transform: translateX(0); }
        50% { transform: translateX(2px); }
      }
      .pacman-group { animation: movePacman 3.5s linear infinite; }
      .mouth { animation: chomp 0.3s ease-in-out infinite; transform-origin: 0px 75px; }
      .eye { animation: eyeBlink 1.5s ease-in-out infinite; }
      .border { animation: pulseBorder 2s ease-in-out infinite; }
      .ghost-visibility { animation: ghostFlee 3.5s steps(1) infinite; }
      .ghost-group { animation: ghostWobble 0.8s ease-in-out infinite; }
      .ghost-eye { animation: ghostEye 0.4s ease-in-out infinite; }

      .char { fill: #FFB84D; font-family: monospace; font-size: 22px; font-weight: bold; }

      @keyframes e1 { 0%,11%{opacity:1} 12%,100%{opacity:0} }
      @keyframes e2 { 0%,15%{opacity:1} 16%,100%{opacity:0} }
      @keyframes e3 { 0%,19%{opacity:1} 20%,100%{opacity:0} }
      @keyframes e4 { 0%,22%{opacity:1} 23%,100%{opacity:0} }
      @keyframes e5 { 0%,26%{opacity:1} 27%,100%{opacity:0} }
      @keyframes e6 { 0%,30%{opacity:1} 31%,100%{opacity:0} }
      @keyframes e7 { 0%,34%{opacity:1} 35%,100%{opacity:0} }
      @keyframes e8 { 0%,38%{opacity:1} 39%,100%{opacity:0} }
      @keyframes e9 { 0%,42%{opacity:1} 43%,100%{opacity:0} }
      @keyframes e10 { 0%,46%{opacity:1} 47%,100%{opacity:0} }
      @keyframes e11 { 0%,50%{opacity:1} 51%,100%{opacity:0} }
      @keyframes e12 { 0%,54%{opacity:1} 55%,100%{opacity:0} }
      @keyframes e13 { 0%,58%{opacity:1} 59%,100%{opacity:0} }
      @keyframes e14 { 0%,62%{opacity:1} 63%,100%{opacity:0} }
      @keyframes e15 { 0%,66%{opacity:1} 67%,100%{opacity:0} }
      @keyframes e16 { 0%,70%{opacity:1} 71%,100%{opacity:0} }
      @keyframes e17 { 0%,74%{opacity:1} 75%,100%{opacity:0} }
      @keyframes e18 { 0%,78%{opacity:1} 79%,100%{opacity:0} }
      .c1 { animation: e1 3.5s steps(1) infinite; }
      .c2 { animation: e2 3.5s steps(1) infinite; }
      .c3 { animation: e3 3.5s steps(1) infinite; }
      .c4 { animation: e4 3.5s steps(1) infinite; }
      .c5 { animation: e5 3.5s steps(1) infinite; }
      .c6 { animation: e6 3.5s steps(1) infinite; }
      .c7 { animation: e7 3.5s steps(1) infinite; }
