  <text x="30" y="280" font-family="monospace" font-size="13" fill="#FFF" class="fade-item f5">NestJS - MongoDB - Tailwind - Cloud</text>

  <text x="30" y="308" font-family="monospace" font-size="13" fill="#FF6B00" class="fade-item f8">$ <tspan fill="#0F0">cat /etc/profile/location</tspan></text>
  <text x="30" y="326" font-family="monospace" font-size="13" fill="#FFF" class="fade-item f8">Rio Branco, AC, Brazil - UTC-5</text>

  <text x="30" y="354" font-family="monospace" font-size="13" fill="#FF6B00" class="fade-item f10">$ <tspan fill="#0F0">cat /etc/profile/status</tspan></text>
  <text x="30" y="372" font-family="monospace" font-size="13" fill="#0F0" class="fade-item f10">System operational - Datamind AI Ecosystem</text>
  <text x="30" y="390" font-family="monospace" font-size="13" fill="#0F0" class="fade-item f10">   Focus: Generative AI &amp; Cloud Architecture</text>

  <text x="30" y="418" font-family="monospace" font-size="13" fill="#FF6B00" class="fade-item f11">$ <tspan fill="#FFF">./cs_profile.sh</tspan><tspan class="cursor" fill="#FFF">#</tspan></text>

  <rect x="12" y="48" width="616" height="382" class="scan-line" rx="0"/>
</svg>