<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    <div class="bg-shapes">
        <div class="shape s1"></div>
        <div class="shape s2"></div>
        <div class="shape s3"></div>
        <div class="shape s4"></div>
    </div>

    <div class="container">
        <div class="login-card">
            <div class="avatar">
                <i class="fas fa-user-circle"></i>
            </div>
            <h2>Bem-vindo</h2>
            <p class="subtitle">Faça login para continuar</p>

            <form id="loginForm">
                <div class="input-group">
                    <i class="fas fa-envelope"></i>
                    <div class="input-field">
                        <input type="email" id="email" required autocomplete="email">
                        <label for="email">Email</label>
                    </div>
                </div>
                <div class="input-group">
                    <i class="fas fa-lock"></i>
                    <div class="input-field">
                        <input type="password" id="password" required autocomplete="current-password">
                        <label for="password">Senha</label>
                        <span class="toggle-pw"><i class="fas fa-eye"></i></span>
                    </div>
                </div>
                <div class="options">
                    <label class="checkbox-label">
                        <input type="checkbox" checked>
                        <span class="checkmark"></span>
                        Lembrar-me
                    </label>
                    <a href="#" class="forgot">Esqueceu a senha?</a>
                </div>
                <button type="submit" class="btn-login">
                    <span class="btn-text">Entrar</span>
                    <span class="btn-loader">
                        <span class="dot d1">.</span>
                        <span class="dot d2">.</span>
                        <span class="dot d3">.</span>
                    </span>
                    <span class="btn-success"><i class="fas fa-check"></i></span>
                    <span class="btn-progress"></span>
                </button>
            </form>
            <p class="signup">Não tem conta? <a href="#">Cadastre-se</a></p>
        </div>
    </div>

    <div class="dock">
        <a href="https://www.apple.com" target="_blank" class="icon" data-tooltip="Apple">
            <i class="fab fa-apple"></i>
        </a>
        <a href="https://github.com" target="_blank" class="icon" data-tooltip="GitHub">
            <i class="fab fa-github"></i>
        </a>
        <a href="https://www.google.com/chrome" target="_blank" class="icon" data-tooltip="Chrome">
            <i class="fab fa-chrome"></i>
        </a>
        <a href="https://www.spotify.com" target="_blank" class="icon" data-tooltip="Spotify">
            <i class="fab fa-spotify"></i>
        </a>
        <a href="https://discord.com" target="_blank" class="icon" data-tooltip="Discord">
            <i class="fab fa-discord"></i>
        </a>
        <a href="https://www.youtube.com" target="_blank" class="icon" data-tooltip="YouTube">
            <i class="fab fa-youtube"></i>
        </a>
    </div>

    <script>
        document.querySelectorAll('.input-field input').forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.classList.add('focused');
            });
            input.addEventListener('blur', () => {
                if (!input.value) input.parentElement.classList.remove('focused');
            });
            if (input.value) input.parentElement.classList.add('focused');
        });

        document.querySelector('.toggle-pw')?.addEventListener('click', function () {
            const input = this.parentElement.querySelector('input');
            const icon = this.querySelector('i');
            if (input.type === 'password') {
                input.type = 'text';
                icon.className = 'fas fa-eye-slash';
            } else {
                input.type = 'password';
                icon.className = 'fas fa-eye';
            }
        });

        document.getElementById('loginForm').addEventListener('submit', function (e) {
            e.preventDefault();
            const btn = this.querySelector('.btn-login');
            if (btn.classList.contains('loading') || btn.classList.contains('success')) return;
            btn.classList.add('loading');
            const bar = btn.querySelector('.btn-progress');
            bar.style.transition = 'none';
            bar.style.width = '0%';
            requestAnimationFrame(() => {
                bar.style.transition = 'width 1.8s cubic-bezier(0.25, 0.46, 0.45, 0.94)';
                bar.style.width = '100%';
            });
            setTimeout(() => {
                btn.classList.remove('loading');
                btn.classList.add('success');
                setTimeout(() => btn.classList.remove('success'), 2000);
            }, 2000);
        });


    </script>
</body>
</html>
